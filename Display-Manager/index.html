<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="style.css" type="text/css"/>
    <script src="script.js"></script>
</head>
<body>
    <div id="clock-container">
        <h1 id="time"></h1>
    </div>
    <div id="date-container">
        <h2 id="date"></h2>
    </div>
    <div id="login-container">
        <h2 id="welcome">-Welcome back-</h2>
        <div id="profile">
            <img id="profile-pic" src="PF.png" alt="profile picture">
            <p id="profile-name">karch</p>
        </div>
        <form id="login-form" onsubmit="login(event)">
            <input id="login-password" type="password">
            <button id="login-button" type="submit">
                <svg fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6.99811 10.2467L7.43298 11.0077C7.70983 11.4922 7.84825 11.7344 7.84825 12C7.84825 12.2656 7.70983 12.5078 7.43299 12.9923L7.43298 12.9923L6.99811 13.7533C5.75981 15.9203 5.14066 17.0039 5.62348 17.5412C6.1063 18.0785 7.24961 17.5783 9.53623 16.5779L15.8119 13.8323C17.6074 13.0468 18.5051 12.654 18.5051 12C18.5051 11.346 17.6074 10.9532 15.8119 10.1677L9.53624 7.4221C7.24962 6.42171 6.1063 5.92151 5.62348 6.45883C5.14066 6.99615 5.75981 8.07966 6.99811 10.2467Z" stroke="#222222"/>
                </svg>
            </button>
        </form>
        <p id="incorrect-password">Incorrect password</p>
    </div>
    <div id="utility-container">
        <button class="utility-button" onclick="shutdown()">
            <img src="assets/shutdown.png" alt="shutdown">
        </button>
        <button class="utility-button" onclick="restart()">
            <img src="assets/restart.png" alt="restart">
        </button>
        <button class="utility-button" onclick="suspend()">
            <img src="assets/suspend.png" alt="suspend">
        </button>
    </div>
</body>
</html>
